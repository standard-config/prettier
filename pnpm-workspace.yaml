autoInstallPeers: false

minimumReleaseAgeExclude:
  - prettier
  - prettier-plugin-expand-json
  - prettier-plugin-markdown-html
  - prettier-plugin-yaml

overrides:
  vite-plus>oxfmt: '-'

peerDependencyRules:
  allowAny:
    - '@vitest/coverage-v8'
    - vitest

strictPeerDependencies: true

trustPolicy: no-downgrade

updateConfig:
  ignoreDependencies:
    - '@types/node'
