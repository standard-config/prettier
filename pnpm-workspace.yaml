autoInstallPeers: false

catalog:
  oxlint: ^1.69.0

color: always

gitChecks: false

minimumReleaseAgeExclude:
  - prettier
  - prettier-plugin-expand-json
  - prettier-plugin-markdown-html
  - prettier-plugin-yaml

overrides:
  vite-plus>oxfmt: '-'
  vite-plus>oxlint: 'catalog:'

peerDependencyRules:
  allowAny:
    - '@vitest/coverage-v8'
    - vitest

strictPeerDependencies: true

trustPolicy: no-downgrade

updateConfig:
  ignoreDependencies:
    - '@types/node'
